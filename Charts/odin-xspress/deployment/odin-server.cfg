[server]
debug_mode  = 0
http_port   = 8888
http_addr   = 0.0.0.0
adapters    = fp, fr, mw, xspress

[tornado]
logging = error

{{- $endpoints := list }}
{{- range $i := until (int .Values.odinDataCount) }}
  {{- $endpoints = append $endpoints (printf "%s-odin-data-%d:10004" $.Values.detectorName $i) }}
{{- end }}

[adapter.fp]
module = odin_data.control.frame_processor_adapter.FrameProcessorAdapter
endpoints = {{ join ", " $endpoints }}
update_interval = 0.2

{{- $endpoints := list }}
{{- range $i := until (int .Values.odinDataCount) }}
  {{- $endpoints = append $endpoints (printf "%s-odin-data-%d:10000" $.Values.detectorName $i) }}
{{- end }}

[adapter.fr]
module = odin_data.control.frame_receiver_adapter.FrameReceiverAdapter
endpoints = {{ join ", " $endpoints }}
update_interval = 0.2

[adapter.mw]
module = odin_data.control.meta_listener_adapter.MetaListenerAdapter
endpoints = {{ .Values.detectorName }}-meta-writer:5659
update_interval = 0.5

{{- $endpoints := list }}
{{- range $i := until (int .Values.odinDataCount) }}
  {{- $endpoints = append $endpoints (printf "{{ .Values.detectorName }}-xspress-control:%d" $.Values.detectorName (add 15150 $i)) }}
{{- end }}

[adapter.xspress]
module = xspress_detector.control.adapter.XspressAdapter
endpoint = {{ .Values.detectorName }}-xspress-control:12000
num_cards = {{ .Values.numCards }}
num_tf = 16384
base_ip = 192.168.0.1
max_channels = {{ .Values.numChannels }}
max_spectra = 4096
settings_path = {{ .Values.settingsPath }}
run_flags = 2
debug = 1
num_process = {{ .Values.odinDataCount }}
daq_endpoints = tcp://127.0.0.1:15150,tcp://127.0.0.1:15151
